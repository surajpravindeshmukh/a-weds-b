<!DOCTYPE html>
<html lang="mr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>मराठी विवाह · संकल्प</title>
    <!-- Favicon as star emoji -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* base deep Indian red, background words will sit behind card */
            background: #681c2c;
            /* deep crimson */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cormorant Garamond', 'Georgia', 'Times New Roman', serif;
            padding: 1rem;
            position: relative;
        }

        /* ---------- background text layer (Marathi vows) ---------- */
        .vow-bg {
            position: fixed;
            /* covers entire viewport, fixed = behind everything */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            /* so clicks go to card */
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            opacity: 0.27;
            /* subtle but legible texture */
        }

        .vow-word {
            font-family: 'Poppins', 'Nirmala UI', sans-serif;
            font-weight: 700;
            color: #fdeacb;
            text-transform: uppercase;
            white-space: nowrap;
            position: absolute;
            /* random placement & sizes via js, but we keep default styling */
        }

        /* invitation card stays above background */
        .invitation-card {
            max-width: 500px;
            width: 100%;
            background: #fef9e8;
            /* warm ivory */
            border-radius: 24px 24px 48px 24px;
            box-shadow: 0 30px 50px rgba(30, 5, 5, 0.6), 0 8px 20px rgba(0, 0, 0, 0.5);
            padding: 2rem 1.5rem;
            text-align: center;
            border: 2px solid #f5b83e;
            position: relative;
            /* above bg */
            z-index: 2;
            backdrop-filter: blur(0.5px);
            /* tiny separation from bg words */
        }

        /* decorative top border */
        .invitation-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 12px;
            background: linear-gradient(90deg, #f9c74f 0%, #f9844a 20%, #f94144 40%, #f9c74f 60%, #90be6d 80%, #577590 100%);
            background-size: 200% 100%;
            opacity: 0.8;
            border-radius: 24px 24px 0 0;
        }

        .mandala {
            font-size: 2.5rem;
            line-height: 1;
            color: #d44c2f;
            margin-bottom: 28.8px;
            letter-spacing: 6px;
            filter: drop-shadow(0 2px 2px #ffcd94);
        }

        h1 {
            font-family: 'Sacramento', 'cursive', 'Georgia';
            font-size: 3.2rem;
            font-weight: 400;
            color: #b33f2f;
            margin: 18px 0 0 0;
            line-height: 1.1;
            text-shadow: 2px 2px 0 #ffe5b4;
        }

        .subhead {
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: #a6462b;
            text-transform: uppercase;
            background: #fff2d7;
            display: inline-block;
            padding: 0.2rem 1.5rem;
            border-radius: 30px;
            margin: 0.5rem 0 0.8rem;
            font-weight: 600;
            border: 1px solid #f7b05e;
        }

        .couple-names {
            font-family: 'Great Vibes', 'cursive', 'serif';
            font-size: 3rem;
            font-weight: 500;
            color: #ba2d0b;
            line-height: 1.2;
            margin: 0.5rem 0 0.2rem;
            background: linear-gradient(135deg, #fcb43a, #d4411e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0px 2px 5px #ffd58c;
            word-break: break-word;
            padding-top: 10px;
        }

        .wedding-symbol {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin: 0.5rem 0;
            font-size: 2rem;
        }

        .wedding-symbol span {
            font-size: 1.8rem;
            color: #c16b2d;
        }

        .details-panel {
            background: #fffbee;
            border-radius: 48px 16px 48px 16px;
            padding: 1.8rem 1.2rem;
            margin: 1.5rem 0 2rem;
            border: 2px solid #f5b342;
            box-shadow: inset 0 0 0 2px #fff3cf, 0 8px 10px #ffd9a3;
        }

        .detail-row {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 1rem;
            margin: 1.2rem 0;
            font-size: 1.3rem;
            color: #642c1a;
            flex-wrap: wrap;
            background: #fff7e4;
            padding: 0.6rem 1rem;
            border-radius: 60px;
            border: 1px solid #f5bd7a;
            transition: all 0.3s ease;
            position: relative;
        }

        /* Breathing animation for location row */
        #locationRow {
            cursor: pointer;
            animation: breathe 3s ease-in-out infinite;
            border: 2px solid #f5b342;
            background: #fff2d7;
            box-shadow: 0 0 10px rgba(245, 180, 66, 0.3);
            position: relative;
        }

        #locationRow:hover {
            animation: none;
            transform: scale(1.02);
            background: #ffebc8;
            border-color: #e07c3e;
            box-shadow: 0 0 15px rgba(224, 124, 62, 0.5);
        }

        @keyframes breathe {
            0% {
                transform: scale(1);
                background-color: #fff2d7;
                box-shadow: 0 0 10px rgba(245, 180, 66, 0.2);
            }

            50% {
                transform: scale(1.02);
                background-color: #ffe8c4;
                box-shadow: 0 0 20px rgba(245, 180, 66, 0.6);
                border-color: #e07c3e;
            }

            100% {
                transform: scale(1);
                background-color: #fff2d7;
                box-shadow: 0 0 10px rgba(245, 180, 66, 0.2);
            }
        }

        .detail-icon {
            font-size: 2rem;
            min-width: 2.5rem;
            filter: drop-shadow(0 2px 2px #f9b953);
        }

        .detail-text {
            font-family: 'Poppins', 'Helvetica', sans-serif;
            font-weight: 500;
            color: #4a251b;
            word-break: break-word;
            flex: 1;
            text-align: left;
            font-size: 1.1rem;
            letter-spacing: 0.4px;
        }

        .rituals {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.2rem;
            margin: 1.8rem 0 1rem;
        }

        .ritual-badge {
            background: #fbd7a4;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            color: #712e18;
            border: 1px solid #e6963e;
            box-shadow: 0 3px 0 #b45f2b;
        }

        .rsvp-section {
            margin: 1.8rem 0 0.8rem;
        }

        .rsvp-btn {
            background: #e07c3e;
            border: none;
            padding: 0.9rem 2.5rem;
            border-radius: 40px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff5e7;
            border-bottom: 5px solid #964b1e;
            transition: 0.1s ease;
            text-decoration: none;
            display: inline-block;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px #fdac6b;
        }

        .rsvp-btn:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
        }

        .footer-note {
            font-size: 1rem;
            color: #9b5f3c;
            border-top: 2px dotted #f4bc6d;
            padding-top: 1.2rem;
            margin-top: 1rem;
            font-style: italic;
        }

        .dynamic-hint {
            background: #f8e1b3;
            font-size: 0.8rem;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            color: #794a21;
            border: 1px solid #cf8b4b;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 1.2rem;
            display: inline-block;
            font-family: monospace;
        }

        .dynamic-hint:hover {
            background: #f5cd92;
        }

        /* Add cursor pointer for patrika div */
        .patrika-div {
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid #f5b83e;
            position: relative;
        }

        .patrika-div:hover {
            background-color: #ffe8cc !important;
            transform: scale(1.02);
            box-shadow: 0 2px 8px rgba(168, 68, 29, 0.2);
        }

        /* Modal styles for image popup - FIXED FOR CENTERING */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            max-width: 90%;
            max-height: 70vh;
            object-fit: contain;
            border: 3px solid #f5b83e;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        /* Button container for download and close buttons */
        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .modal-btn {
            background: #e07c3e;
            color: white;
            padding: 12px 30px;
            border-radius: 40px;
            text-decoration: none;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 1.1rem;
            border: 2px solid #f5b83e;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            display: inline-block;
            transition: all 0.3s ease;
        }

        .modal-btn:hover {
            background: #d44c2f;
            transform: scale(1.02);
        }

        .modal-btn.close-btn {
            background: #681c2c;
            border-color: #a8441d;
        }

        .modal-btn.close-btn:hover {
            background: #8a2538;
        }

        @media (max-width: 600px) {
            .modal-content {
                max-width: 95%;
                max-height: 65vh;
            }

            .modal-buttons {
                gap: 10px;
                flex-wrap: wrap;
                justify-content: center;
            }

            .modal-btn {
                padding: 10px 25px;
                font-size: 1rem;
            }
        }

        /* Soft pulse animation */
        @keyframes softPulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.02);
            }

            100% {
                transform: scale(1);
            }
        }

        #locationRow,
        .patrika-div {
            animation: softPulse 2.5s ease-in-out infinite;
        }

        /* Stop animation on hover for better UX */
        #locationRow:hover,
        .patrika-div:hover {
            animation: none;
            transform: scale(1.03);
        }

                    playPromise.catch(() => {
